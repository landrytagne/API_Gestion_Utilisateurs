spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: postgres

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  application:
    name: API_Gestion_Utilisateurs

server:
  port: 8080

jwt:
  secret: maCleSecreteSuperLonguePourJWT1234567890
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: "API Gestion des Utilisateurs"
    description: "API de gestion des utilisateurs avec authentification JWT"
    version: "1.0.0"